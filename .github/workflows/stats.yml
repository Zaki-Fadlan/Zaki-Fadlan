name: Generate GitHub Stats Cards

on:
  # Runs daily
  schedule:
    - cron: "0 0 * * *"
  # Allows manual trigger
  workflow_dispatch:
  # Run on push to main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Generate profile summary cards locally (no external API needed)
      - name: Generate Profile Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          THEME_NAME: tokyonight

      # Fetch streak card separately (demolab is usually reliable)
      - name: Fetch Streak Card
        run: |
          mkdir -p profile-summary-card-output
          for i in 1 2 3 4 5; do
            echo "Attempt $i: Fetching streak card..."
            if curl -sSf --max-time 30 -o profile-summary-card-output/streak.svg \
              "https://streak-stats.demolab.com/?user=Zaki-Fadlan&theme=tokyonight-duo&hide_border=true&background=1a1b27&stroke=DDA0DD&ring=FF9EC4&fire=FFB7C5&currStreakNum=FFFFFF&sideNums=FFFFFF&currStreakLabel=DDA0DD&sideLabels=B0C4FF&dates=554466"; then
              echo "Streak card fetched successfully"
              break
            fi
            echo "Retry in $((i * 10)) seconds..."
            sleep $((i * 10))
          done

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update profile stats cards [skip ci]"
            git push
          fi
