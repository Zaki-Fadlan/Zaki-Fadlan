name: Generate GitHub Stats Cards

on:
  # Runs every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  # Allows manual trigger
  workflow_dispatch:
  # Run on push to main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Stats Cards
        run: |
          mkdir -p stats

          # GitHub Stats Card (retry up to 5 times with backoff)
          for i in 1 2 3 4 5; do
            echo "Attempt $i: Fetching stats card..."
            if curl -sSf --max-time 30 -o stats/stats.svg \
              "https://github-readme-stats.vercel.app/api?username=Zaki-Fadlan&show_icons=true&theme=tokyonight&include_all_commits=true&count_private=true&hide_border=true&bg_color=0c0b1a&title_color=FF9EC4&icon_color=DDA0DD&text_color=B0C4FF&ring_color=FFB7C5"; then
              echo "Stats card fetched successfully"
              break
            fi
            echo "Retry in $((i * 15)) seconds..."
            sleep $((i * 15))
          done

          # Top Languages Card
          for i in 1 2 3 4 5; do
            echo "Attempt $i: Fetching top-langs card..."
            if curl -sSf --max-time 30 -o stats/top-langs.svg \
              "https://github-readme-stats.vercel.app/api/top-langs/?username=Zaki-Fadlan&layout=compact&langs_count=8&theme=tokyonight&hide_border=true&bg_color=0c0b1a&title_color=FF9EC4&text_color=B0C4FF"; then
              echo "Top-langs card fetched successfully"
              break
            fi
            echo "Retry in $((i * 15)) seconds..."
            sleep $((i * 15))
          done

          # GitHub Streak Card
          for i in 1 2 3 4 5; do
            echo "Attempt $i: Fetching streak card..."
            if curl -sSf --max-time 30 -o stats/streak.svg \
              "https://streak-stats.demolab.com/?user=Zaki-Fadlan&theme=tokyonight-duo&hide_border=true&background=0c0b1a&stroke=DDA0DD&ring=FF9EC4&fire=FFB7C5&currStreakNum=FFFFFF&sideNums=FFFFFF&currStreakLabel=DDA0DD&sideLabels=B0C4FF&dates=554466"; then
              echo "Streak card fetched successfully"
              break
            fi
            echo "Retry in $((i * 15)) seconds..."
            sleep $((i * 15))
          done

      - name: Verify Downloads
        run: |
          echo "=== Downloaded files ==="
          ls -la stats/
          for f in stats/*.svg; do
            if [ -f "$f" ]; then
              size=$(wc -c < "$f")
              if [ "$size" -lt 100 ]; then
                echo "WARNING: $f seems too small ($size bytes), might be invalid"
              else
                echo "OK: $f ($size bytes)"
              fi
            fi
          done

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update stats cards [skip ci]"
            git push
          fi
