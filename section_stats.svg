<svg width="860" height="45" viewBox="0 0 860 45" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes tw { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.85; } }
      .t1 { animation: tw 3.2s ease-in-out 0.8s infinite; }
      .t2 { animation: tw 3.2s ease-in-out 2.4s infinite; }
      .bg { fill: #0e1525; }
      .txt { fill: #ECE5D8; }
      .deco { fill: #D3BC8E; }
      .dot { fill: #FFD93D; }
      .ln { stroke: #D3BC8E; }
      @media (prefers-color-scheme: light) {
        .bg { fill: #f5f0e8; }
        .txt { fill: #2a2520; }
        .deco { fill: #8B7355; }
        .dot { fill: #B8860B; }
        .ln { stroke: #8B7355; }
      }
    </style>
    <path id="dia" d="M0,-4 L4,0 L0,4 L-4,0Z"/>
  </defs>
  <rect width="860" height="45" rx="10" class="bg"/>
  <rect width="860" height="1.5" rx="1" class="deco" opacity="0.5"/>
  <rect y="43.5" width="860" height="1.5" rx="1" class="deco" opacity="0.25"/>
  <g transform="translate(30,22.5)"><use href="#dia" class="deco" opacity="0.55" transform="scale(0.55)"/></g>
  <g transform="translate(830,22.5)"><use href="#dia" class="deco" opacity="0.55" transform="scale(0.55)"/></g>
  <line x1="38" y1="22.5" x2="378" y2="22.5" class="ln" stroke-width="0.3" opacity="0.25"/>
  <line x1="482" y1="22.5" x2="822" y2="22.5" class="ln" stroke-width="0.3" opacity="0.25"/>
  <text x="430" y="28" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" class="txt" letter-spacing="5">STATS</text>
  <circle cx="50" cy="18" r="0.8" class="dot t1"/>
  <circle cx="810" cy="28" r="0.8" class="dot t2"/>
</svg>
