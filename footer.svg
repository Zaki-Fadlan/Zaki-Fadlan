<svg width="860" height="90" viewBox="0 0 860 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes twinkle { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.9; } }
      @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
      .t1 { animation: twinkle 3s ease-in-out infinite; }
      .t2 { animation: twinkle 3s ease-in-out 1s infinite; }
      .t3 { animation: twinkle 3s ease-in-out 2s infinite; }
      .gl { animation: pulse 4s ease-in-out infinite; }
    </style>
    <path id="dia" d="M0,-4 L4,0 L0,4 L-4,0Z"/>
    <path id="star4" d="M0,-5 L1,-1 L5,0 L1,1 L0,5 L-1,1 L-5,0 L-1,-1Z"/>
  </defs>
  <rect width="860" height="90" rx="14" fill="#0e1525"/>
  <rect width="860" height="2" fill="#D3BC8E"/>
  <rect y="88" width="860" height="2" fill="#D3BC8E"/>
  <rect width="2" height="90" fill="#D3BC8E" opacity="0.3"/>
  <rect x="858" width="2" height="90" fill="#D3BC8E" opacity="0.3"/>
  <circle cx="65" cy="30" r="0.8" fill="#FFD93D" class="t1"/>
  <circle cx="795" cy="60" r="0.8" fill="#FFD93D" class="t2"/>
  <circle cx="150" cy="70" r="0.6" fill="#fff" class="t3"/>
  <circle cx="710" cy="25" r="0.6" fill="#fff" class="t1"/>
  <g class="gl" transform="translate(80,45)"><use href="#dia" fill="#D3BC8E" opacity="0.4" transform="scale(0.7)"/></g>
  <g class="gl" transform="translate(780,45)"><use href="#dia" fill="#D3BC8E" opacity="0.4" transform="scale(0.7)"/></g>
  <g class="t2" transform="translate(180,28)"><use href="#star4" fill="#D3BC8E" transform="scale(0.35)" opacity="0.3"/></g>
  <g class="t3" transform="translate(680,62)"><use href="#star4" fill="#D3BC8E" transform="scale(0.35)" opacity="0.3"/></g>
  <text x="430" y="34" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#C4A46C" font-style="italic" letter-spacing="1.5">The world is vast — there is no need to rush.</text>
  <text x="430" y="54" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#5A6B8A" letter-spacing="1">If you give up, that's where the game ends.</text>
  <text x="430" y="74" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8A8070">code  /  build  /  deploy  /  repeat</text>
</svg>
