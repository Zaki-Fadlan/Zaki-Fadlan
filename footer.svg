<svg width="860" height="90" viewBox="0 0 860 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes twinkle { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.9; } }
      @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
      .t1 { animation: twinkle 3s ease-in-out infinite; }
      .t2 { animation: twinkle 3s ease-in-out 1s infinite; }
      .t3 { animation: twinkle 3s ease-in-out 2s infinite; }
      .gl { animation: pulse 4s ease-in-out infinite; }
      .bg { fill: #0e1525; }
      .txt { fill: #C4A46C; }
      .txt2 { fill: #5A6B8A; }
      .txt3 { fill: #8A8070; }
      .deco { fill: #D3BC8E; }
      .dot { fill: #FFD93D; }
      .dot-w { fill: #ffffff; }
      @media (prefers-color-scheme: light) {
        .bg { fill: #f5f0e8; }
        .txt { fill: #6B5535; }
        .txt2 { fill: #7a7065; }
        .txt3 { fill: #5a5550; }
        .deco { fill: #8B7355; }
        .dot { fill: #B8860B; }
        .dot-w { fill: #8B7355; }
      }
    </style>
    <path id="dia" d="M0,-4 L4,0 L0,4 L-4,0Z"/>
    <path id="star4" d="M0,-5 L1,-1 L5,0 L1,1 L0,5 L-1,1 L-5,0 L-1,-1Z"/>
  </defs>
  <rect width="860" height="90" rx="14" class="bg"/>
  <rect width="860" height="2" class="deco"/>
  <rect y="88" width="860" height="2" class="deco"/>
  <rect width="2" height="90" class="deco" opacity="0.3"/>
  <rect x="858" width="2" height="90" class="deco" opacity="0.3"/>
  <circle cx="65" cy="30" r="0.8" class="dot t1"/>
  <circle cx="795" cy="60" r="0.8" class="dot t2"/>
  <circle cx="150" cy="70" r="0.6" class="dot-w t3"/>
  <circle cx="710" cy="25" r="0.6" class="dot-w t1"/>
  <g class="gl" transform="translate(80,45)"><use href="#dia" class="deco" opacity="0.4" transform="scale(0.7)"/></g>
  <g class="gl" transform="translate(780,45)"><use href="#dia" class="deco" opacity="0.4" transform="scale(0.7)"/></g>
  <g class="t2" transform="translate(180,28)"><use href="#star4" class="deco" transform="scale(0.35)" opacity="0.3"/></g>
  <g class="t3" transform="translate(680,62)"><use href="#star4" class="deco" transform="scale(0.35)" opacity="0.3"/></g>
  <text x="430" y="34" text-anchor="middle" font-family="Georgia, serif" font-size="13" class="txt" font-style="italic" letter-spacing="1.5">The world is vast — there is no need to rush.</text>
  <text x="430" y="54" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" class="txt2" letter-spacing="1">If you give up, that's where the game ends.</text>
  <text x="430" y="74" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" class="txt3">code  /  build  /  deploy  /  repeat</text>
</svg>
