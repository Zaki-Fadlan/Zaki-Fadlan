<svg width="860" height="90" viewBox="0 0 860 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes drift {
        0%   { transform: translateX(0px) rotate(0deg); }
        50%  { transform: translateX(10px) rotate(18deg); }
        100% { transform: translateX(0px) rotate(0deg); }
      }
      .dr  { animation: drift 4.2s ease-in-out infinite; }
      .dr2 { animation: drift 4.2s ease-in-out 1.1s infinite; }
      .dr3 { animation: drift 4.2s ease-in-out 2.2s infinite; }
      .dr4 { animation: drift 4.2s ease-in-out 3.1s infinite; }
    </style>
    <path id="pk" d="M0,-6 C2.5,-6 5.5,-3 5.5,0 C5.5,3.5 2.5,7 0,7 C-2.5,7 -5.5,3.5 -5.5,0 C-5.5,-3 -2.5,-6 0,-6Z"/>
  </defs>

  <rect width="860" height="90" rx="14" fill="#0c0b1a"/>
  <rect width="860" height="3" rx="1" fill="#FF9EC4"/>
  <rect y="87" width="860" height="3" rx="1" fill="#98E4FF"/>
  <rect width="3" height="90" rx="1" fill="#FF9EC4" opacity=".4"/>
  <rect x="857" width="3" height="90" rx="1" fill="#98E4FF" opacity=".4"/>

  <g class="dr"  transform="translate(78,44)"> <use href="#pk" fill="#FF9EC4" opacity=".5"/></g>
  <g class="dr2" transform="translate(782,44)"><use href="#pk" fill="#98E4FF" opacity=".5" transform="rotate(30)"/></g>
  <g class="dr3" transform="translate(195,24)"><use href="#pk" fill="#DDA0DD" opacity=".4" transform="scale(.7)"/></g>
  <g class="dr4" transform="translate(665,66)"><use href="#pk" fill="#FFB7C5" opacity=".4" transform="scale(.7) rotate(-20)"/></g>

  <text x="430" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#DDA0DD" font-style="italic" letter-spacing="1.5">「 諦めたらそこで試合終了ですよ 」</text>
  <text x="430" y="54" text-anchor="middle" font-family="monospace" font-size="10" fill="#443355" letter-spacing="1">If you give up, that's where the game ends.</text>
  <text x="430" y="74" text-anchor="middle" font-family="monospace" font-size="11" fill="#7755aa">☕  ngoding  ·  📺  anime  ·  🚀  deploy  ·  またね！ (｡◕‿◕｡)ﾉ</text>
</svg>
