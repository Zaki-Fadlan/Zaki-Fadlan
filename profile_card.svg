  <line x1="20" y1="300" x2="840" y2="300" class="bdr" stroke-width="0.6"/>
  <g transform="translate(430,316)"><use href="#dia" class="deco" opacity="0.4" transform="scale(0.35)"/></g>
  <text x="430" y="324" text-anchor="middle" font-family="Georgia, serif" font-size="12" class="gold" font-style="italic" letter-spacing="1.2">If you give up, that's where the game ends.</text>
