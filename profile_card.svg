  <text x="790" y="132" text-anchor="middle" font-family="monospace" font-size="9" fill="#74C2A8">Active</text>

  <rect x="450" y="150" width="380" height="28" rx="8" class="bg2"/>
  <text x="462" y="168" font-family="monospace" font-size="10.5" class="txt-blue">AI Farm Dashboard</text>
  <rect x="760" y="154" width="60" height="20" rx="10" class="bg-ok"/>
  <text x="790" y="168" text-anchor="middle" font-family="monospace" font-size="9" fill="#74C2A8">Active</text>

